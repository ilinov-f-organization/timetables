security:
  - cookieAuth: [ ]

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: apiKey
  schemas:
    pagination:
      type: object
      required:
        - total_pages
        - page
      properties:
        total_pages:
          type: integer
          x-go-type: int32
        page:
          type: integer
          x-go-type: int32
    subgroup:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          minimum: 1
          x-go-type: int32
        name:
          type: string
    listSubgroups:
      type: object
      required:
        - pagination
        - subgroups
      properties:
        pagination:
          $ref: '#/components/schemas/pagination'
        subgroups:
          type: array
          items:
            $ref: '#/components/schemas/subgroup'
    teacher:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          minimum: 1
          x-go-type: int32
        name:
          type: string
    listTeachers:
      type: object
      required:
        - pagination
        - teachers
      properties:
        pagination:
          $ref: '#/components/schemas/pagination'
        teachers:
          type: array
          items:
            $ref: '#/components/schemas/teacher'
    location:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          minimum: 1
          x-go-type: int32
        name:
          type: string
    listLocations:
      type: object
      required:
        - pagination
        - locations
      properties:
        pagination:
          $ref: '#/components/schemas/pagination'
        locations:
          type: array
          items:
            $ref: '#/components/schemas/location'
    subject:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          minimum: 1
          x-go-type: int32
        name:
          type: string
    listSubjects:
      type: object
      required:
        - pagination
        - subjects
      properties:
        pagination:
          $ref: '#/components/schemas/pagination'
        subjects:
          type: array
          items:
            $ref: '#/components/schemas/subject'
    timetable:
      type: object
      required:
        - id
        - name
        - date_start
        - date_end
        - week
      properties:
        id:
          type: integer
          minimum: 1
          x-go-type: int32
        name:
          type: string
        date_start:
          type: string
          format: date-time
        date_end:
          type: string
          format: date-time
        week:
          type: integer
          minimum: 1
          maximum: 2
          x-go-type: int32
    listTimetables:
      type: object
      required:
        - pagination
        - timetables
      properties:
        pagination:
          $ref: '#/components/schemas/pagination'
        timetables:
          type: array
          items:
            $ref: '#/components/schemas/timetable'
    teacherLocationAssignment:
      type: object
      required:
        - teacher
        - location
      properties:
        teacher:
          $ref: '#/components/schemas/teacher'
        location:
          $ref: '#/components/schemas/location'
    lesson:
      type: object
      required:
        - id
        - subject
        - category
        - day
        - time_start
        - time_end
        - repeat_rule
        - timetable
        - teacher_location_assignments
        - subgroups
      properties:
        id:
          type: string
          format: uuid
          x-go-type: uuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
        subject:
          $ref: '#/components/schemas/subject'
        category:
          type: string
        day:
          type: integer
          x-go-type: int32
        time_start:
          type: integer
          x-go-type: int32
          description: "time of lesson start in minutes from the beginning of the day"
        time_end:
          type: integer
          x-go-type: int32
          description: "time of lesson end in minutes from the beginning of the day"
        repeat_rule:
          type: integer
          x-go-type: int32
          minimum: 0
          maximum: 2
        timetable:
          $ref: '#/components/schemas/timetable'
        teacher_location_assignments:
          type: array
          items:
            $ref: '#/components/schemas/teacherLocationAssignment'
        subgroups:
          type: array
          items:
            $ref: '#/components/schemas/subgroup'
    error:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          enum: [ CODE_BAD_REQUEST, CODE_UNAUTHORIZED, CODE_FORBIDDEN, CODE_WRONG_ARCHIVE, CODE_WRONG_XLSX, CODE_CANNOT_SERIALIZE_ICS, CODE_DB_ERROR ]
        message:
          type: string
        file:
          type: string
    listErrors:
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/pagination'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/error'
    user:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [ unauthorized, user, admin ]
